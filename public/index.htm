<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;800&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-200 min-h-screen flex items-center justify-center p-8 font-[Nunito Sans]">

  <!-- 🌤️ Main Outer Container -->
  <div class="main-container bg-white-50 w-200 flex items-center justi backdrop-blur-sm p-10 rounded-2xl shadow-2xl flex gap-20 border border-gray-300">

    <!-- Left Column -->
    <div class="left-column flex flex-col gap-10">
      <!-- Big Rectangle -->
      <!-- 🌦️ Large 1 Weather Box -->
<div
  class="box-large-1 w-80 h-96 bg-gradient-to-b from-blue-500 to-sky-400 rounded-2xl shadow-2xl flex flex-col justify-between items-center text-white p-5 font-[Nunito Sans]"
>

  <!-- Top Section -->
  <div class="flex flex-col items-center gap-3">
    <!-- Weather Icon -->
    <img id="weatherIcon" src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png" alt="Weather Icon"
      class="w-20 h-20 drop-shadow-lg">

    <!-- Temperature -->
    <h2 id="temperature" class="text-4xl font-extrabold tracking-tight">00</h2>

    <!-- City Name -->
    <p id="cityName" class="text-xl font-medium opacity-90">Karachi</p>
  </div>

  <!-- Divider Line -->
  <div class="w-full border-t border-white/40 my-2"></div>

  <!-- Bottom Stats -->
  <div class="flex items-end w-full px-3 text-center">
    <!-- Wind -->
    <div class="flex flex-col w-55 items-center">
      <span class="text-sm text-black font-semibold">Wind Now</span>
      <span id="windNow" class="text-lg text-black font-bold">km</span>

    </div>

    <!-- Humidity -->
    <div class="flex flex-col w-55 items-center">
      <span class="text-sm text-black font-semibold">Humidity</span>
      <span id="humidity" class="text-lg text-black font-bold">%</span>

    </div>

    <!-- Wind Degree -->
    <div class="flex flex-col w-55 items-center">
      <span class="text-sm text-black font-semibold">Wind Degree</span>
      <span id="windDegree" class="text-lg text-black font-bold">%</span>

    </div>
  </div>

</div>


      <!-- Small Rectangle -->
 <div
  class="box-small-2 w-80 h-45 bg-slate-500 rounded-xl shadow-lg flex flex-col items-center justify-center text-white font-[Nunito Sans] gap-4 p-4"
>
  <!-- Title -->
  <h2 class="text-xl font-semibold tracking-wide">Check Yours</h2>

  <!-- Input Field -->
  <input
    id="search"
    type="text"
    placeholder="Check yours"
    class="w-60 px-4 py-2 text-gray-900 bg-white rounded-full shadow-inner focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm placeholder-gray-500"
  />

  <!-- Stylish Button -->
  <button
  id="searchBtn"
    class="mt-2 bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-cyan-500 hover:to-blue-500 text-white font-semibold px-6 py-2 rounded-full shadow-md hover:shadow-lg transition-all duration-300 flex items-center gap-2"
  >
    <span>Search</span>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="2"
      stroke="currentColor"
      class="w-5 h-5"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7-7 7M3 12h18" />
    </svg>
  </button>
</div>


    </div>

    <!-- Right Column -->
    <div class="right-column flex flex-col gap-10">
      <!-- Small Square -->
     <div
  class="box-small-1 w-80 h-40 bg-slate-500 rounded-xl shadow-lg flex items-center justify-center text-white font-[Nunito Sans]"
>
  <div class="flex items-center gap-4">
    <!-- Left Arrow Icon -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="2"
      stroke="currentColor"
      class="w-8 h-8 text-white"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>

    <!-- Text -->
    <h2 class="text-2xl font-semibold tracking-wide">My City Weather</h2>
  </div>
</div>


      <!-- Big Rectangle -->
     <!-- 🌦️ Large 2 Weather Box -->
<div
  class="box-large-2 w-80 h-96 bg-gradient-to-b from-indigo-300 to-purple-500 rounded-2xl shadow-2xl flex flex-col justify-between items-center text-white p-5 font-[Nunito Sans]"
>

  <!-- Top Section -->
  <div class="flex flex-col items-center gap-3">
    <!-- Weather Icon -->
    <img id="weatherIcon2" src="https://cdn-icons-png.flaticon.com/512/414/414825.png" alt="Weather Icon"
      class="w-20 h-20 drop-shadow-lg">

    <!-- Temperature -->
    <h2 id="temperature2" class="text-4xl font-extrabold tracking-tight">28°C</h2>

    <!-- City Name -->
    <p id="cityName2" class="text-xl font-medium opacity-90">Lahore</p>
  </div>

  <!-- Divider Line -->
  <div class="w-full border-t border-white/40 my-2"></div>

  <!-- Bottom Stats -->
  <div class="flex items-end w-full px-3 text-center">
    <!-- Wind -->
    <div class="flex flex-col w-1/3 items-center">
      <span class="text-sm text-black font-semibold">Wind Now</span>
      <span id="windNow2" class="text-lg text-black font-bold">km</span>
    </div>

    <!-- Humidity -->
    <div class="flex flex-col w-1/3 items-center">
      <span class="text-sm text-black font-semibold">Humidity</span>
      <span id="humidity2" class="text-lg text-black font-bold">%</span>
    </div>

    <!-- Wind Degree -->
    <div class="flex flex-col w-1/3 items-center">
      <span class="text-sm text-black font-semibold">Wind Degree</span>
      <span id="windDegree2" class="text-lg text-black font-bold">%</span>
    </div>
  </div>

</div>

    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
